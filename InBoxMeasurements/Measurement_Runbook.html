<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WMTMW In-Wall Measurement Runbook</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ---------- Page + print ---------- */
  @page { size: letter; margin: 0.6in 0.7in; }
  @media print {
    body { font-size: 10.5pt; }
    h2 { page-break-before: always; }
    h2:first-of-type { page-break-before: auto; }
    .no-print { display: none; }
    a { color: inherit; text-decoration: none; }
    svg { page-break-inside: avoid; }
    table, .callout, pre { page-break-inside: avoid; }
  }

  /* ---------- Typography ---------- */
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #111;
    max-width: 7.5in;
    margin: 0.5in auto;
    padding: 0 0.5in;
    line-height: 1.45;
  }
  h1 { font-size: 22pt; margin: 0 0 0.2em; }
  h2 { font-size: 16pt; margin-top: 1.4em; border-bottom: 2px solid #333; padding-bottom: 0.15em; }
  h3 { font-size: 12.5pt; margin-top: 1.1em; }
  h4 { font-size: 11pt; margin: 0.9em 0 0.3em; }
  p, li { font-size: 10.5pt; }
  code, pre, kbd, samp { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 9.5pt; }
  pre {
    background: #f4f4f4;
    border: 1px solid #ddd;
    border-radius: 3px;
    padding: 0.6em 0.9em;
    overflow-x: auto;
    white-space: pre;
  }
  code { background: #f4f4f4; padding: 0 3px; border-radius: 2px; }
  pre code { background: transparent; padding: 0; }

  /* ---------- Tables ---------- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.6em 0 1em;
    font-size: 10pt;
  }
  th, td {
    border: 1px solid #bbb;
    padding: 4px 8px;
    vertical-align: top;
    text-align: left;
  }
  th { background: #eee; }
  tbody tr:nth-child(even) { background: #fafafa; }

  /* ---------- Callouts ---------- */
  .callout {
    border-left: 4px solid #888;
    background: #f6f6f6;
    padding: 0.6em 0.9em;
    margin: 0.8em 0;
    border-radius: 0 3px 3px 0;
  }
  .callout.safety { border-left-color: #c0392b; background: #fdecea; }
  .callout.warn   { border-left-color: #d68910; background: #fdf2e1; }
  .callout.info   { border-left-color: #2471a3; background: #e8f1fb; }
  .callout.ok     { border-left-color: #229954; background: #e6f6ec; }
  .callout .tag {
    display: inline-block;
    font-weight: 700;
    font-size: 9pt;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 0.5em;
  }
  .callout.safety .tag { color: #922b21; }
  .callout.warn   .tag { color: #9c640c; }
  .callout.info   .tag { color: #1a5276; }
  .callout.ok     .tag { color: #196f3d; }

  /* ---------- TOC ---------- */
  .toc { border: 1px solid #ccc; background: #fafafa; padding: 0.6em 1em; border-radius: 3px; }
  .toc ol { margin: 0.3em 0 0.3em 1.2em; padding: 0; }
  .toc li { margin: 0.1em 0; }
  .toc a { color: #1a5276; text-decoration: none; }
  .toc a:hover { text-decoration: underline; }

  /* ---------- SVG ---------- */
  figure { margin: 1em 0; text-align: center; }
  figure svg { max-width: 100%; height: auto; background: #fff; }
  figcaption { font-size: 9.5pt; color: #555; margin-top: 0.3em; font-style: italic; }

  /* ---------- Misc ---------- */
  .subtle { color: #666; font-size: 9.5pt; }
  hr { border: 0; border-top: 1px solid #ccc; margin: 1.6em 0; }
  .tag-pill {
    display: inline-block; font-size: 9pt; padding: 1px 6px;
    border-radius: 10px; background: #eaeaea; color: #333;
  }
</style>
</head>
<body>

<h1>WMTMW In-Wall Measurement Runbook</h1>
<p class="subtle">Printable companion to <code>Measurement_Runbook.md</code>. For basement use.</p>

<!-- TOC goes in step 2 -->
<div class="toc" id="toc">
  <strong>Contents</strong>
  <p class="subtle" style="margin:0.3em 0 0">(populated in a later step)</p>
</div>

<!-- Section 0 + all other sections populated in later steps -->

</body>
</html>
